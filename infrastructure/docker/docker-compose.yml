version: '3.9'

services:
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/nexus-seos.db
    volumes:
      - nexus_data:/data
    restart: unless-stopped

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  nexus_data:

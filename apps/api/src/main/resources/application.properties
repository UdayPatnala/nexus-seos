# Server Settings
server.port=8080
server.servlet.context-path=/api/v1

# SQLite Configuration (Default for local running without setup)
spring.datasource.url=jdbc:sqlite:nexus-seos.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security Settings
# secret key for JWT (HS256 requires 256 bits, base64 encoded)
security.jwt.secret=dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3ItbmV4dXMtc2Vvcy1wbGF0Zm9ybS1hbmQtbXVzdC1iZS1hdC1sZWFzdC0yNTYtYml0cw==
security.jwt.expiration-ms=86400000

# CORS settings
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Disable default Spring Security auto-generated user (conflicts with custom JWT auth)
spring.security.user.name=disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:}
